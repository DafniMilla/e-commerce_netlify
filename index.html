<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Floricultura BellaDaf</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
background: linear-gradient(135deg, rgba(168, 224, 99, 0.8), rgba(255, 175, 204, 0.8));
    min-height: 100vh;
  }

  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 2rem 1rem 3rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 500;
    color: #f945ff;
    margin-bottom: 4px;
  }

  .header p {
    font-size: 14px;
    color: #888;
  }

  .card {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.12);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .card label {
    display: block;
    font-size: 13px;
    color: #666;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .card input {
    width: 100%;
    padding: 10px 12px;
    font-size: 15px;
    border: 0.5px solid rgba(0,0,0,0.2);
    border-radius: 8px;
    background: #f8f8f7;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .card input:focus {
    border-color: rgba(0,0,0,0.4);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }

  .field-row { display: flex; gap: 12px; }
  .field-row > div { flex: 1; }

  .submit-btn {
    width: 100%;
    padding: 12px;
    font-size: 15px;
    font-weight: 500;
    background: #f945ff;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 0.25rem;
  }

  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .steps-section {
    margin-top: 1.5rem;
  }

  .steps-label {
    font-size: 12px;
    font-weight: 500;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.75rem;
  }

  .step-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
  }

  .step-item:last-child { border-bottom: none; }

  .step-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
    border: 0.5px solid rgba(0,0,0,0.1);
    background: #f5f5f3;
    transition: background 0.3s, border-color 0.3s;
  }

  .step-icon.active  { background: #E6F1FB; border-color: #378ADD; }
  .step-icon.done    { background: #EAF3DE; border-color: #639922; }
  .step-icon.error   { background: #FCEBEB; border-color: #E24B4A; }

  .step-body { flex: 1; }

  .step-name {
    font-size: 14px;
    font-weight: 500;
    color: #1a1a1a;
    margin-bottom: 2px;
  }

  .step-status {
    font-size: 13px;
    color: #888;
    min-height: 18px;
    transition: color 0.2s;
  }

  .step-status.success { color: #3B6D11; }
  .step-status.error   { color: #A32D2D; }

  .step-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 99px;
    flex-shrink: 0;
    align-self: center;
  }

  .badge-waiting { background: #f5f5f3; color: #aaa; border: 0.5px solid rgba(0,0,0,0.1); }
  .badge-loading { background: #E6F1FB; color: #185FA5; border: 0.5px solid #B5D4F4; }
  .badge-done    { background: #EAF3DE; color: #3B6D11; border: 0.5px solid #C0DD97; }
  .badge-error   { background: #FCEBEB; color: #A32D2D; border: 0.5px solid #F7C1C1; }

  .progress-bar-wrap {
    height: 3px;
    background: #e8e8e6;
    border-radius: 99px;
    margin-bottom: 1.25rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: #378ADD;
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  .final-msg {
    text-align: center;
    padding: 1rem 0 0.5rem;
    font-size: 14px;
    font-weight: 500;
    color: #888;
    min-height: 24px;
  }

  .spinner {
    display: inline-block;
    width: 13px;
    height: 13px;
    border: 2px solid #B5D4F4;
    border-top-color: #185FA5;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 5px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<div class="wrap">

  <div class="header">
    <h1>BellaDaf Flores 🪻</h1>
    <p>Preencha os dados para enviar seu pedido</p>
  </div>

  <div class="card">
    <div class="field-row">
      <div>
        <label for="produto">Produto</label>
        <input id="produto" type="text" placeholder="Ex: Rosas vermelhas">
      </div>
      <div>
        <label for="valor">Valor (R$)</label>
        <input id="valor" type="number" placeholder="0,00" min="0">
      </div>
    </div>
  </div>

  <button class="submit-btn" onclick="iniciarPedido()" id="btn-enviar">Confirmar pedido</button>

  <div class="steps-section" id="steps-section" style="display:none;">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <p class="steps-label">Acompanhe o processo</p>

    <div class="step-item">
      <div class="step-icon" id="icon-pedido">🛒</div>
      <div class="step-body">
        <div class="step-name">Registro do pedido</div>
        <div class="step-status" id="msg-pedido">Aguardando...</div>
      </div>
      <span class="step-badge badge-waiting" id="badge-pedido">Aguardando</span>
    </div>

    <div class="step-item">
      <div class="step-icon" id="icon-pagamento">💳</div>
      <div class="step-body">
        <div class="step-name">Processamento do pagamento</div>
        <div class="step-status" id="msg-pagamento">Aguardando...</div>
      </div>
      <span class="step-badge badge-waiting" id="badge-pagamento">Aguardando</span>
    </div>

    <div class="step-item">
      <div class="step-icon" id="icon-notificacao">🔔</div>
      <div class="step-body">
        <div class="step-name">Envio da notificação</div>
        <div class="step-status" id="msg-notificacao">Aguardando...</div>
      </div>
      <span class="step-badge badge-waiting" id="badge-notificacao">Aguardando</span>
    </div>

    <div class="final-msg" id="final-msg"></div>
  </div>

</div>

<script>
  function esperar(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  function setStep(id, state, msg, badgeText) {
    const icon  = document.getElementById('icon-' + id);
    const msgEl = document.getElementById('msg-' + id);
    const badge = document.getElementById('badge-' + id);

    icon.className = 'step-icon ' + (state === 'loading' ? 'active' : state === 'done' ? 'done' : state === 'error' ? 'error' : '');
    msgEl.className = 'step-status ' + (state === 'done' ? 'success' : state === 'error' ? 'error' : '');
    msgEl.innerHTML = state === 'loading'
      ? '<span class="spinner"></span>' + msg
      : msg;
    badge.className = 'step-badge badge-' + (state === 'loading' ? 'loading' : state === 'done' ? 'done' : state === 'error' ? 'error' : 'waiting');
    badge.textContent = badgeText;
  }

  function setProgress(pct) {
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  async function iniciarPedido() {
    const produto = document.getElementById('produto').value.trim();
    const valor   = document.getElementById('valor').value.trim();

    if (!produto || !valor) {
      alert('Preencha o produto e o valor antes de continuar.');
      return;
    }

    const btn = document.getElementById('btn-enviar');
    btn.disabled = true;
    btn.textContent = 'Processando...';

    document.getElementById('steps-section').style.display = 'block';
    document.getElementById('final-msg').textContent = '';
    setProgress(5);

    // 1. Pedido
    setStep('pedido', 'loading', 'Registrando pedido...', 'Em andamento');
    setProgress(15);
    await esperar(800);

    try {
      const r1 = await fetch('/.netlify/functions/pedido', {
        method: 'POST',
        body: JSON.stringify({ produto, valor })
      });
      const d1 = await r1.json();
      await esperar(600);
      setStep('pedido', 'done', d1.mensagem || 'Pedido registrado com sucesso', 'Concluído');
      setProgress(40);
    } catch (e) {
      setStep('pedido', 'error', 'Falha ao registrar o pedido', 'Erro');
      document.getElementById('final-msg').textContent = 'Processo interrompido. Tente novamente.';
      btn.disabled = false;
      btn.textContent = 'Tentar novamente';
      return;
    }

    // 2. Pagamento
    
setStep('pagamento', 'loading', 'Autorizando pagamento...', 'Em andamento');
setProgress(55);
await esperar(800);

try {
  const r2 = await fetch('/.netlify/functions/pagamento', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ valor: Number(valor) })
  });
  const d2 = await r2.json();
  await esperar(600);
  setStep('pagamento', 'done', d2.mensagem || 'Pagamento aprovado', 'Concluído');
  setProgress(78);
} catch (e) {
  setStep('pagamento', 'error', 'Falha ao processar o pagamento', 'Erro');
  document.getElementById('final-msg').textContent = 'Processo interrompido. Tente novamente.';
  btn.disabled = false;
  btn.textContent = 'Tentar novamente';
  return;
}

    // 3. Notificação
    setStep('notificacao', 'loading', 'Enviando confirmação...', 'Em andamento');
    setProgress(90);
    await esperar(800);

    try {
      const r3 = await fetch('/.netlify/functions/notificacao');
      const d3 = await r3.json();
      await esperar(600);
      setStep('notificacao', 'done', d3.mensagem || 'Notificação enviada', 'Concluído');
      setProgress(100);
    } catch (e) {
      setStep('notificacao', 'error', 'Falha ao enviar notificação', 'Erro');
      document.getElementById('final-msg').textContent = 'Pedido realizado, mas a notificação falhou.';
      btn.disabled = false;
      btn.textContent = 'Tentar novamente';
      return;
    }

    document.getElementById('final-msg').textContent = 'Pedido finalizado com sucesso!';
    btn.textContent = 'Novo pedido';
    btn.disabled = false;
    btn.onclick = () => {
      document.getElementById('steps-section').style.display = 'none';
      document.getElementById('produto').value = '';
      document.getElementById('valor').value = '';
      setProgress(0);
      ['pedido', 'pagamento', 'notificacao'].forEach(id => setStep(id, '', 'Aguardando...', 'Aguardando'));
      btn.textContent = 'Confirmar pedido';
      btn.onclick = iniciarPedido;
    };
  }
</script>

</body>
</html>
